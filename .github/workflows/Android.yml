name: Android Build

on: 
  workflow_dispatch:

env:
  HXCPP_COMPILE_CACHE: ${{ github.workspace }}/.hxcpp_cache

jobs:
  build:
    name: Android Build
    runs-on: ubuntu-24.04
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v3
        with:
          haxe-version: 4.3.2

      - name: Restore Cache
        uses: actions/cache@v4
        with:
          key: cache-android-psych-${{ github.sha }}
          path: |
            .haxelib/
            ${{ env.HXCPP_COMPILE_CACHE }}
            export/release/android/haxe/
            export/release/android/obj/
          restore-keys: |
            cache-android-psych-

      - name: Install Libraries
        run: |
          haxelib install hmm --quiet
          haxelib run hmm setup
          haxelib run hmm install
          haxelib run lime rebuild hxcpp --quiet

      - name: Configure Android
        run: |
          haxelib run lime setup android
          haxelib run lime config ANDROID_SDK $ANDROID_HOME
          haxelib run lime config ANDROID_NDK_ROOT $ANDROID_NDK_LATEST_HOME
          haxelib run lime config JAVA_HOME $JAVA_HOME
          haxelib run lime config ANDROID_SETUP true

      - name: Compile
        run: haxelib run lime build android -release -Dnext -D HXCPP_COMPILE_CACHE=${{ env.HXCPP_COMPILE_CACHE }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PsychEngine-Android
          path: export/release/android/bin/app/build/outputs/apk/release/*.apk
          if-no-files-found: error